# Workflow de CI de ejemplo para proyectos derivados del boilerplate.
#
# IMPORTANTE: este archivo vive en `.github/workflows-template/` (NO en
# `.github/workflows/`) para que GitHub no lo ejecute en el repo del boilerplate.
# Para activarlo en tu proyecto, moverlo a `.github/workflows/ci.yml`.
#
# Si usás otra plataforma de CI (Bitbucket Pipelines, GitLab CI, etc.), copiá
# los mismos `npm run ci` / `npm run build` / `npm run test:e2e` a su sintaxis.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + lint
        run: npm run ci

      - name: Build
        run: npm run build
        env:
          SITE_URL: https://example.com

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          SITE_URL: http://localhost:3000
